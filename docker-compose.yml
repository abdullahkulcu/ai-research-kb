services:
  cli:
    build: .
    volumes:
      - ./research:/app/research
      - ./examples:/app/examples
      - ./config.yaml:/app/config.yaml:ro
      - ./index:/app/index
      - ./users.yaml:/app/users.yaml
    env_file:
      - .env
    command: ["--help"]

  api:
    build: .
    volumes:
      - ./research:/app/research
      - ./examples:/app/examples
      - ./config.yaml:/app/config.yaml:ro
      - ./index:/app/index
      - ./users.yaml:/app/users.yaml
    env_file:
      - .env
    ports:
      - "8000:8000"
    entrypoint: ["ai-research-kb"]
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: ./web-ui
      args:
        VITE_API_BASE: http://localhost:8000/api
    ports:
      - "4173:4173"
    depends_on:
      - api
